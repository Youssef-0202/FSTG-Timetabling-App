version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fstm_timetable_db
    restart: always 
    environment:
      POSTGRES_USER: user_pfe
      POSTGRES_PASSWORD: password_pfe
      POSTGRES_DB: fstm_timetable
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: fstm_timetable_api
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user_pfe:password_pfe@db:5432/fstm_timetable

volumes:
  postgres_data:
